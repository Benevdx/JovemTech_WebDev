      type="number" → aceita só números, com setas +/-

  <!--
  ══════════════════════════════════════════════════════════════
  TODO 8 ── JAVASCRIPT: CONFIRMAÇÃO DE RESERVA
  ══════════════════════════════════════════════════════════════
  O JavaScript fica SEMPRE aqui — antes do </body>, por último.
  Isso garante que o HTML já foi carregado quando o script roda.

  O código abaixo:
  1. "Escuta" o evento de envio do formulário
  2. Impede o comportamento padrão (recarregar a página)
  3. Lê o valor do campo "nome"
  4. Exibe uma mensagem de confirmação personalizada

  ✏️  Substitua este comentário pelo bloco <script> abaixo:

  <script>
    // Pega o formulário pelo id "form-reserva"
    const formulario = document.getElementById('form-reserva');

    // Pega a div onde a mensagem vai aparecer
    const mensagem = document.getElementById('mensagem-confirmacao');

    // "Escuta" o evento submit (clique em Confirmar Reserva)
    formulario.addEventListener('submit', function(evento) {

      // Impede a página de recarregar
      evento.preventDefault();

      // Lê o valor do campo nome
      const nome = document.getElementById('nome').value;
      const data = document.getElementById('data').value;
      const pessoas = document.getElementById('pessoas').value;

      // Exibe a mensagem de confirmação
      mensagem.innerHTML =
        '<p class="confirmacao-ok">' +
          '✅ Reserva confirmada para <strong>' + nome + '</strong>! ' +
          'Aguardamos você em ' + data + ' com ' + pessoas + ' pessoa(s).' +
        '</p>';

      // Limpa o formulário após envio
      formulario.reset();
    });
  </script>

  ──────────────────────────────────────────────────────────
  COMO FUNCIONA O JavaScript ACIMA:
  ──────────────────────────────────────────────────────────

  document.getElementById('id')
  → Busca um elemento pelo seu id.
  → Retorna o elemento HTML — podemos guardar em uma variável.

  .addEventListener('submit', function(evento) { ... })
  → Adiciona um "ouvinte" ao formulário.
  → Quando o usuário clicar em enviar, a função é executada.

  evento.preventDefault()
  → O comportamento padrão de um form é recarregar a página.
  → Esse método cancela esse comportamento.

  .value
  → Propriedade que retorna o texto digitado num input.

  element.innerHTML = '...'
  → Define o conteúdo HTML dentro de um elemento.
  → Permite inserir tags HTML junto com o texto.

  formulario.reset()
  → Limpa todos os campos do formulário.
  ══════════════════════════════════════════════════════════
  -->
