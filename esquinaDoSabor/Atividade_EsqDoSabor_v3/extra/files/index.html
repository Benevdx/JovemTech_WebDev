  <!--

  TODO 3 ── CABEÇALHO  <header>
  ══════════════════════════════════════════════════════════════
  O <header> envolve o nome do restaurante e a navegação.
  Ele aparece igual nas 3 páginas (index, cardápio, reservas).

  ✏️  Envolva o bloco abaixo com <header> ... </header>
  -->

    <!--
      TODO 4 ── Nome e slogan
      ────────────────────────
      ✏️  Troque pelo nome e slogan do SEU restaurante.
          Mantenha as tags <h1> e <p>.
    -->
    <h1>Nome do Restaurante</h1>
    <p>Seu slogan aqui</p>

    <!--
      TODO 5 ── Menu de navegação  <nav>
      ────────────────────────────────────
      IMPORTANTE: este menu aponta para ARQUIVOS diferentes,
      não para âncoras (#). Os links usam o nome do arquivo:
        href="index.html"    → página inicial   (esta página)
        href="cardapio.html" → página do cardápio
        href="reservas.html" → página de reservas

      ✏️  Crie a estrutura abaixo:

      <nav>
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="cardapio.html">Cardápio</a></li>
          <li><a href="reservas.html">Reservas</a></li>
        </ul>
      </nav>

      Dica: o link da página atual pode ter class="ativo"
      para receber um estilo diferente no CSS.
      Ex: <li><a href="index.html" class="ativo">Início</a></li>
    -->

  <!-- FIM DO CABEÇALHO -->


  <!--

  -->


    <!--

    Personalize com o tema do seu restaurante!
    -->


    <!--

    Esta seção mostra 3 pratos em destaque.
    O cardápio completo fica na página cardapio.html.

    ✏️  Crie uma <section id="destaques"> com:
        → <h2> "Destaques do Cardápio" (ou similar)
        → 3 <article>, cada um com:
            <h3> nome do prato
            <p>  descrição curta
            <p class="preco"> R$ 00,00

    ✏️  Abaixo dos 3 articles, adicione um link para o cardápio:
        <a href="cardapio.html">Ver cardápio completo →</a>

    Personalize os pratos com o tema do seu restaurante!
    -->


    <!--
    ──────────────────────────────────────────────────────────
    TODO 9 ── SEÇÃO: SOBRE NÓS
    ──────────────────────────────────────────────────────────
    ✏️  Crie uma <section id="sobre"> com:

        → 2 <p> contando a história fictícia do restaurante

    ─────────────────────────────────────────────────
    Sugestões:
    - Quando foi fundado? Por quem?
    - Qual é a especialidade da casa?
    - Qual é a proposta do restaurante?
    -->


    <!--

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" />

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" />

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem"></textarea>

        <button type="submit">Enviar</button>

    Isso é acessibilidade!
